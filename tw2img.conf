# tw2img default configuration
# Location: ~/.config/tw2img/tw2img.conf
#
# All CLI flags can be set here as defaults.
# CLI flags always override these values.

[tw2img]

# Output
# Default output width in pixels (tweet card width)
width = 598

# Render in light mode instead of dark
light = false

# Disable @2x retina (half-size output)
no_retina = false

# Content display
# Hide the "Posted from iPhone" / source label
no_source = false

# Show only the focal tweet, strip parent thread context
no_context = false

# Show full unabbreviated stat counts (e.g. 12,345 instead of 12.3K)
full_stats = false

# Use Nitter CSS theme instead of Twitter default dark/light
nitter = false

# Authentication
# Use guest mode (no auth tokens required, limited API access)
guest = false

# Auth tokens - prefer environment variables TWITTER_AUTH_TOKEN / TWITTER_CSRF_TOKEN
# Uncomment and set here only if you don't use envars
# auth_token = your_auth_token_here
# csrf_token = your_csrf_token_here

# Upload / export
# Automatically upload rendered PNG to Imgur
imgur = false

# Advanced
# Path to a custom Nitter CSS theme file (overrides --nitter)
# css = /path/to/nitter/public/css/themes/pleroma.css

# Save HTML instead of rendering PNG (leave blank to disable)
# save_html =

# Dump raw API JSON to stdout and exit (debugging)
dump_json = false
